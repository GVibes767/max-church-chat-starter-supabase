<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1526" />
    <title>GVBS Media Chat</title>
    <link rel="manifest" href="./manifest.webmanifest?v=10" />
    <link rel="stylesheet" href="./final-styles.css?v=10" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./final-app.js?v=10"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js?v=10').catch(function (err) {
            console.error('SW register failed', err);
          });
        });
      }
    </script>
  </body>
</html>
